name: 'HecklerDetection'
description: 'Detect dangerous invisible Unicode characters (Glassworm, Trojan Source, etc.)'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Path to scan'
    required: false
    default: '.'
  scan-deps:
    description: 'Include dependency directories (node_modules, vendor, etc.)'
    required: false
    default: 'false'
  severity:
    description: 'Minimum severity to report (critical, high, medium, low)'
    required: false
    default: 'low'
  format:
    description: 'Output format (text, json, sarif)'
    required: false
    default: 'text'
  config:
    description: 'Path to .heckler.yml config file'
    required: false
    default: ''
  upload-sarif:
    description: 'Upload SARIF results to GitHub Security tab'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
      with:
        python-version: '3.x'

    - name: Install heckler
      shell: bash
      run: pip install "${{ github.action_path }}"

    - name: Run scan
      shell: bash
      env:
        INPUT_SEVERITY: ${{ inputs.severity }}
        INPUT_SCAN_DEPS: ${{ inputs.scan-deps }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_UPLOAD_SARIF: ${{ inputs.upload-sarif }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_PATH: ${{ inputs.path }}
      run: |
        ARGS="--ci --severity $INPUT_SEVERITY"

        if [ "$INPUT_SCAN_DEPS" = "true" ]; then
          ARGS="$ARGS --scan-deps"
        fi

        if [ -n "$INPUT_CONFIG" ]; then
          ARGS="$ARGS --config $INPUT_CONFIG"
        fi

        if [ "$INPUT_UPLOAD_SARIF" = "true" ]; then
          heckler $ARGS --format sarif "$INPUT_PATH" > heckler-results.sarif || true
          heckler $ARGS "$INPUT_PATH"
        elif [ "$INPUT_FORMAT" = "sarif" ]; then
          heckler $ARGS --format sarif "$INPUT_PATH"
        else
          heckler $ARGS --format "$INPUT_FORMAT" "$INPUT_PATH"
        fi

    - name: Upload SARIF
      if: inputs.upload-sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@cb06a0a8527b2c6970741b3a0baa15231dc74a4c  # v4
      with:
        sarif_file: heckler-results.sarif
        category: heckler
