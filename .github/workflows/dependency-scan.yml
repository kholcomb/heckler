name: Dependency Unicode Scan

on:
  pull_request:
    paths:
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - 'requirements.txt'
      - 'requirements/*.txt'
      - 'poetry.lock'
      - 'Pipfile.lock'
      - 'go.sum'
      - 'Gemfile.lock'
      - 'composer.lock'
      - 'uv.lock'
  push:
    branches: [main, master]
    paths:
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - 'requirements.txt'
      - 'requirements/*.txt'
      - 'poetry.lock'
      - 'Pipfile.lock'
      - 'go.sum'
      - 'Gemfile.lock'
      - 'composer.lock'
      - 'uv.lock'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  dep-scan:
    name: Scan dependencies for invisible Unicode
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install heckler
        run: pip install .

      - name: Compute lockfile hash
        id: lock-hash
        run: |
          HASH=$(find . -maxdepth 3 \( -name "package-lock.json" -o -name "yarn.lock" -o -name "pnpm-lock.yaml" -o -name "requirements.txt" -o -name "poetry.lock" -o -name "Pipfile.lock" -o -name "go.sum" -o -name "uv.lock" \) -exec sha256sum {} + 2>/dev/null | sha256sum | cut -d' ' -f1)
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"

      - name: Restore scan cache
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: .heckler-dep-scan-result
          key: heckler-deps-${{ steps.lock-hash.outputs.hash }}

      - name: Auto-detect and install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile
          elif [ -f package-lock.json ]; then
            npm ci
          fi

          if [ -f poetry.lock ]; then
            pip install poetry && poetry install --no-interaction
          elif [ -f Pipfile.lock ]; then
            pip install pipenv && pipenv install
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Scan dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          set +e
          heckler --ci --scan-deps --format json . > .heckler-dep-scan-result
          EXIT_CODE=$?
          echo "scan_exit_code=${EXIT_CODE}" >> "$GITHUB_ENV"

      - name: Save scan cache
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .heckler-dep-scan-result
          key: heckler-deps-${{ steps.lock-hash.outputs.hash }}

      - name: Report results
        run: |
          if [ ! -f .heckler-dep-scan-result ]; then
            echo "## Dependency Unicode Scan" >> "$GITHUB_STEP_SUMMARY"
            echo "No scan results found." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          COUNT=$(python3 -c "import json; print(len(json.load(open('.heckler-dep-scan-result'))))" 2>/dev/null || echo "0")

          if [ "$COUNT" = "0" ]; then
            echo "## Dependency Unicode Scan" >> "$GITHUB_STEP_SUMMARY"
            echo "No dangerous invisible Unicode characters found in dependencies." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Dependency Unicode Scan" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**${COUNT} dangerous character(s) found in dependencies.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Package | File | Line | Character | Severity |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---------|------|------|-----------|----------|" >> "$GITHUB_STEP_SUMMARY"
            python3 -c "
          import json
          for f in json.load(open('.heckler-dep-scan-result'))[:50]:
              pkg = f.get('package') or 'unknown'
              fname = f['file'].split('/')[-1]
              print(f'| \`{pkg}\` | \`{fname}\` | {f[\"line\"]} | {f[\"codepoint\"]} ({f[\"name\"]}) | {f[\"severity\"].upper()} |')
          " >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
